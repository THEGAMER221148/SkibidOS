<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Skibidoperating System</title>
        <style>
            body {
                margin: 0%;
                overflow: hidden;
                font-family: monospace;
                background-color: rgb(0, 0, 0);
                position: fixed;
                font-size: 20px;
                line-height: 20px;
            }
            #terminal{
                position: fixed;
                width: 100%;
                color: rgb(200, 200, 200);
                margin: 0%;
                white-space: pre-wrap;
                bottom: 40px;
            }
            #editor {
                position: fixed;
                width: 100%;
                color: rgb(200, 200, 200);
                font-size: 20px;
                line-height: 20px;
                margin: 0%;
                white-space: pre-wrap;
                top: 20px;
                left: 0px;
                background-color: rgb(0, 0, 0);
                height: 100%;
                z-index: 998;
                border: none;
            }
            #editorWindow {
                visibility: hidden;
            }
            #inputContainer {
                position: fixed;
                bottom: 0;
                width: 100%;
                height: 24px;
                background: black;
                font: 20px monospace;
            }

            #highlight, #input {
                position: absolute;
                inset: 0;
                padding: 0;
                margin: 0;
                font: inherit;
                line-height: 24px;
            }

            #highlight {
                pointer-events: none;
                white-space: pre;
                color: white;
            }

            #input {
                background: transparent;
                color: transparent;
                caret-color: white;
                border: none;
                outline: none;
                width: 100%;
            }
            
            input:focus {
                outline: none;
            }

        </style>
    </head>
    <body>
        <div id="terminal">Welcome to SkibidOS!<br></div>
        <div id="inputContainer">
            <div id="highlight"></div>
            <input type="text" id="input" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>
        <div id="editorWindow">
            <span style="color: rgb(0, 255, 0)" id="info">Blank editor (nothing you type here will be saved!)</span>
            <textarea id="editor">Editor</textarea>
        </div>
        <script src="./UIHandler.js" type="module"></script>
    </body>
</html>
